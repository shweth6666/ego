<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance | Secure Entry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #0b0f1a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0b0f1a 100%);
        }

        /* Ambient Glow Blobs */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from {
                transform: translate(-20%, -20%) scale(1);
            }

            to {
                transform: translate(20%, 20%) scale(1.2);
            }
        }

        /* --- THE BAG (Container) --- */
        .bag-container {
            width: 400px;
            perspective: 1500px;
            z-index: 10;
        }

        .bag-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
            position: relative;
            transform-style: preserve-3d;

            /* The "Bag Thrown" Animation */
            opacity: 0;
            animation: bagDrop 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bagDrop {
            0% {
                transform: scale(0.2) rotate(-45deg) translateY(-1000px) rotateX(90deg);
                opacity: 0;
            }

            60% {
                transform: scale(1.1) rotate(5deg) translateY(20px) rotateX(-10deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) rotate(0) translateY(0) rotateX(0);
                opacity: 1;
            }
        }

        /* --- STAGE 1: ROLE SELECTION --- */
        /* Content Unfolding Animation */
        .stage {
            animation: unfold 0.6s 0.8s ease-out both;
            width: 100%;
        }

        @keyframes unfold {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .stage.hidden {
            display: none;
        }

        h1 {
            color: white;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .role-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: 0.3s;
            color: #94a3b8;
        }

        .role-option i {
            width: 20px;
            color: #64748b;
            transition: 0.3s;
        }

        .role-option:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .role-option.selected {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .role-option.selected i {
            color: var(--primary);
        }

        .btn-continue,
        .btn-login {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-continue:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .btn-continue:hover:not(:disabled) {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--primary-glow);
        }

        /* --- STAGE 2: FORM --- */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
        }

        .back-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            transition: 0.2s;
        }

        .back-btn:hover {
            color: white;
        }

        #error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        /* Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="blob"></div>

    <div class="bag-container">
        <div class="bag-card opening" id="bag">

            <!-- STAGE 1: ROLE CHOICE -->
            <div id="step-1" class="stage">
                <h1>Who are you?</h1>
                <div class="role-grid">
                    <div class="role-option" onclick="selectRole('student')">
                        <i data-lucide="graduation-cap"></i>
                        <span>Student</span>
                    </div>
                    <div class="role-option" onclick="selectRole('faculty')">
                        <i data-lucide="users"></i>
                        <span>Faculty</span>
                    </div>
                    <div class="role-option" onclick="selectRole('admin')">
                        <i data-lucide="user-cog"></i>
                        <span>Admin</span>
                    </div>
                </div>
                <button class="btn-continue" id="continue-btn" disabled onclick="goToStep2()">
                    Continue <i data-lucide="arrow-right" style="width: 18px;"></i>
                </button>
            </div>

            <!-- STAGE 2: LOGIN FORM -->
            <div id="step-2" class="stage hidden">
                <button class="back-btn" onclick="goToStep1()">
                    <i data-lucide="chevron-left" style="width: 16px;"></i> Back
                </button>
                <h1 id="form-title">Faculty Login</h1>

                <div id="error-msg"></div>

                <form id="loginForm" autocomplete="off">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn-login" id="submit-btn">
                        <span id="btn-text">Sign In</span>
                        <div class="spinner" id="spinner"></div>
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();
        let selectedRole = null;
        const API_BASE = window.location.origin + "/api";

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.innerText.toLowerCase().includes(role)) opt.classList.add('selected');
            });
            document.getElementById('continue-btn').disabled = false;
        }

        function goToStep2() {
            // Clear inputs when entering the login form step
            document.getElementById('loginForm').reset();
            document.getElementById('error-msg').style.display = 'none';

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('step-2').style.opacity = '1';
            document.getElementById('step-2').style.transform = 'translateY(0)';
            document.getElementById('form-title').innerText = selectedRole.charAt(0).toUpperCase() + selectedRole.slice(1) + " Login";
            resetUI();
        }

        function goToStep1() {
            // Clear inputs when going back
            document.getElementById('loginForm').reset();

            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
        }

        // Also reset form on page load
        window.onload = () => {
            document.getElementById('loginForm').reset();
            resetUI();
        };

        function getDeviceId() {
            let id = localStorage.getItem('qr_device_id');
            if (!id) {
                id = 'dev-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('qr_device_id', id);
            }
            return id;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');

            errEl.style.display = 'none';
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            submitBtn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        device_id: getDeviceId()
                    })
                });

                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({ message: "Unknown Server Error" }));
                    showError(errorData.message || "Login failed");
                    resetUI();
                    return;
                }

                const data = await res.json();

                if (data.success) {
                    // Check if role matches selected role
                    if (data.user.role !== selectedRole) {
                        showError("Incorrect portal. This user is a " + data.user.role);
                        resetUI();
                        return;
                    }

                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_role', data.user.role);
                    localStorage.setItem('user_name', data.user.name);
                    localStorage.setItem('student_id', data.user.id);

                    submitBtn.style.background = "#10b981";
                    btnText.innerText = "Authorized...";
                    btnText.style.display = "block";
                    spinner.style.display = "none";

                    setTimeout(() => {
                        console.log("Redirecting for role:", data.user.role);
                        if (data.user.role === 'faculty') window.location.href = 'faculty_create_session.html';
                        else if (data.user.role === 'student') window.location.href = 'student_scan.html';
                        else if (data.user.role === 'admin') window.location.href = 'admin_dashboard.html';
                        else {
                            showError("Unknown role: " + data.user.role);
                            resetUI();
                        }
                    }, 800);
                } else {
                    showError(data.message);
                    resetUI();
                }
            } catch (err) {
                if (window.location.protocol === 'file:') {
                    showError("Error: File protocol detected. Please open http://127.0.0.1:8080 instead.");
                } else {
                    showError("Connection Refused. Check if backend is running.");
                    console.error("Login Error:", err);
                }
                resetUI();
            }
        });

        function showError(msg) {
            const err = document.getElementById('error-msg');
            err.innerText = msg;
            err.style.display = 'block';
        }

        function resetUI() {
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');

            submitBtn.disabled = false;
            submitBtn.style.background = "var(--primary)"; // Reset to original color
            btnText.innerText = "Sign In"; // Reset to original text
            btnText.style.display = 'inline';
            spinner.style.display = 'none';
        }
    </script>
</body>

</html>
